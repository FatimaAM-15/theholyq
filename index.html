<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Holy Quran</title>

<style>
body{
font-family: Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

header{
background:#020617;
padding:20px;
font-size:28px;
font-weight:bold;
}

section{
padding:30px;
}

iframe{
width:90%;
height:600px;
border:none;
border-radius:10px;
}

.audio-player{
margin-top:20px;
}

audio{
width:80%;
margin:10px;
}
</style>

</head>

<body>

<header>
The Holy Quran
<p style="font-size:16px;">Read and listen to the Holy Quran</p>
</header>

<section>

<h2>Read Quran</h2>

<iframe src="https://theholyquran.atoms.world/"></iframe>

</section>


<section>

<h2>Listen to Quran</h2>

<div class="audio-player">

<p>Surah Al-Fatiha</p>
<audio controls>
<source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/001.mp3" type="audio/mpeg">
</audio>

<p>Surah Al-Ikhlas</p>
<audio controls>
<source src="https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/112.mp3" type="audio/mpeg">
</audio>

</div>

</section>

</body>
</html>
